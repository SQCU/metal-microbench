<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>gemma metal bridge — side-by-side streaming demo</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; padding: 0; background: #0a0a0a; color: #d4d4d4; font-family: ui-monospace, 'SF Mono', Monaco, monospace; }
  header { padding: 0.8em 1.2em; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
  header h1 { margin: 0; font-size: 1rem; font-weight: 500; color: #6a9; }
  header .status { font-size: 0.8rem; color: #888; }
  main { display: grid; grid-template-columns: 1fr 1fr; gap: 1em; padding: 1em; height: calc(100vh - 4em); box-sizing: border-box; }
  .pane { display: flex; flex-direction: column; gap: 0.6em; background: #111; border: 1px solid #222; border-radius: 4px; padding: 0.8em; min-height: 0; }
  .pane h2 { margin: 0; font-size: 0.85rem; color: #9af; font-weight: 500; }
  textarea {
    width: 100%; min-height: 4em; resize: vertical; box-sizing: border-box;
    background: #0a0a0a; color: #d4d4d4; border: 1px solid #333; border-radius: 3px;
    font: inherit; padding: 0.5em;
  }
  .row { display: flex; gap: 0.5em; align-items: center; }
  button {
    padding: 0.4em 1em; background: #1a5; color: #000; border: 0; border-radius: 3px;
    font: inherit; font-weight: 600; cursor: pointer;
  }
  button:disabled { background: #333; color: #888; cursor: not-allowed; }
  .meta { font-size: 0.75rem; color: #888; margin-left: auto; }
  .output {
    flex: 1; overflow-y: auto; background: #0a0a0a; border: 1px solid #222; border-radius: 3px;
    padding: 0.6em; white-space: pre-wrap; word-wrap: break-word;
    font-size: 0.9rem; line-height: 1.4;
  }
  .output:empty::before { content: '(output streams here)'; color: #444; }
  .imgrow { display: flex; align-items: center; gap: 0.5em; font-size: 0.75rem; color: #888; }
  .imgrow input[type=file] { font-size: 0.7rem; color: #888; }
  .imgrow .thumb { max-height: 3em; max-width: 3em; border: 1px solid #333; border-radius: 2px; }
  .imgrow .clear { background: none; border: 1px solid #444; color: #888; padding: 0.15em 0.4em; font-size: 0.7rem; cursor: pointer; }
  .kvstrip { display: flex; flex-wrap: wrap; gap: 2px; margin-top: 0.4em; padding: 0.4em; background: #0a0a0a; border: 1px solid #222; border-radius: 3px; min-height: 2em; }
  .kvstrip .label { font-size: 0.7rem; color: #666; margin-right: 0.5em; align-self: center; }
  .kvstrip .cell {
    width: 0.9em; height: 0.9em; border-radius: 2px; background: #222;
    flex: none; cursor: default;
  }
  .kvstrip .cell.own   { background: #2a5; }    /* private — unique to this session */
  .kvstrip .cell.shr2  { background: #fa3; }    /* shared with exactly 1 other — hot prefix */
  .kvstrip .cell.shr3p { background: #f36; }    /* shared with 2+ others — truly hot */
  .kvstrip:empty::after { content: '(no pages yet)'; color: #444; font-size: 0.75rem; }
</style>
</head>
<body>
<header>
  <h1>gemma metal bridge — two streams, one GPU</h1>
  <div class="status" id="status">checking…</div>
</header>
<main>
  <div class="pane">
    <h2>stream A</h2>
    <textarea id="qA">What is the capital of France?</textarea>
    <div class="imgrow">
      <label>image:</label>
      <input type="file" id="imgA" accept="image/*" onchange="onPick('A')">
      <img class="thumb" id="thumbA" style="display:none">
      <button class="clear" onclick="clearImg('A')" id="clearA" style="display:none">×</button>
    </div>
    <div class="row">
      <button id="askA" onclick="ask('A')">ask</button>
      <span class="meta" id="metaA"></span>
    </div>
    <div class="output" id="oA"></div>
    <div class="kvstrip" id="kvA"><span class="label">kv pages:</span></div>
  </div>
  <div class="pane">
    <h2>stream B</h2>
    <textarea id="qB">Write a one-sentence haiku about compilers.</textarea>
    <div class="imgrow">
      <label>image:</label>
      <input type="file" id="imgB" accept="image/*" onchange="onPick('B')">
      <img class="thumb" id="thumbB" style="display:none">
      <button class="clear" onclick="clearImg('B')" id="clearB" style="display:none">×</button>
    </div>
    <div class="row">
      <button id="askB" onclick="ask('B')">ask</button>
      <span class="meta" id="metaB"></span>
    </div>
    <div class="output" id="oB"></div>
    <div class="kvstrip" id="kvB"><span class="label">kv pages:</span></div>
  </div>
</main>

<script>
// Health poll — demonstrates / documents the /health endpoint from JS.
async function pollHealth() {
  try {
    const r = await fetch('/health');
    const j = await r.json();
    document.getElementById('status').textContent =
      `${j.status} · ${j.model} · ${j.active_sessions} active session${j.active_sessions === 1 ? '' : 's'}`;
  } catch (e) {
    document.getElementById('status').textContent = `down: ${e.message}`;
  }
}
pollHealth();
setInterval(pollHealth, 1500);

// Per-pane attached image state (data URL or null) + pane → session-id map.
const imgData = {A: null, B: null};
const paneSid = {A: null, B: null};

// KV snapshot poll loop. Runs while any pane's session is still alive in
// the engine (i.e. appears in /v1/kv/snapshot). paneSid[pane] is set when
// the pane fires a request and stays set forever after — we only use its
// presence in the snapshot (not the ask-finish timing) to decide when to
// stop polling. That way the strip keeps rendering during the server-side
// linger after SSE ends, and the final page-count is visible instead of
// flickering empty the moment the HTTP response closes.
let kvPolling = false;
async function kvPoll() {
  if (kvPolling) return;
  kvPolling = true;
  try {
    while (true) {
      let snap;
      try {
        const r = await fetch('/v1/kv/snapshot');
        snap = await r.json();
      } catch (e) {
        await new Promise(r => setTimeout(r, 300));
        continue;
      }
      renderKv(snap);
      // Exit when none of our tracked pane sids still exist in the engine.
      // Whatever we last rendered stays on screen until the next ask().
      const anyAlive = ['A', 'B'].some(
        pane => paneSid[pane] !== null &&
                snap.sessions.some(s => s.sid === paneSid[pane]));
      if (!anyAlive) break;
      await new Promise(r => setTimeout(r, 300));
    }
  } finally {
    kvPolling = false;
  }
}

function renderKv(snapshot) {
  for (const pane of ['A', 'B']) {
    const strip = document.getElementById(`kv${pane}`);
    const sid = paneSid[pane];
    if (sid === null) {
      // This pane never asked anything — keep the strip empty.
      strip.innerHTML = '<span class="label">kv pages:</span>';
      continue;
    }
    const sess = snapshot.sessions.find(s => s.sid === sid);
    if (!sess) {
      // Session closed (past linger). Leave the strip alone so the last
      // rendered state stays visible until the user asks again — don't
      // overwrite with an empty placeholder.
      continue;
    }
    strip.innerHTML = '<span class="label">kv pages:</span>';
    const tokensLabel = document.createElement('span');
    tokensLabel.className = 'label';
    tokensLabel.textContent = `s${sid} · ${sess.state} · ${sess.position} tok · ${sess.page_count} pages (${sess.shared_count} shared)`;
    strip.appendChild(tokensLabel);
    for (const p of sess.pages) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      if (p.refcount >= 3) cell.classList.add('shr3p');
      else if (p.refcount >= 2) cell.classList.add('shr2');
      else cell.classList.add('own');
      const others = p.shared_with.length
        ? ` · shared with s${p.shared_with.join(',s')}`
        : '';
      cell.title = `phys ${p.phys}${others}`;
      strip.appendChild(cell);
    }
  }
}

function onPick(which) {
  const f = document.getElementById(`img${which}`).files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = e => {
    imgData[which] = e.target.result;  // data:image/...;base64,...
    const t = document.getElementById(`thumb${which}`);
    t.src = e.target.result; t.style.display = 'inline-block';
    document.getElementById(`clear${which}`).style.display = 'inline-block';
  };
  reader.readAsDataURL(f);
}

function clearImg(which) {
  imgData[which] = null;
  document.getElementById(`img${which}`).value = '';
  document.getElementById(`thumb${which}`).style.display = 'none';
  document.getElementById(`clear${which}`).style.display = 'none';
}

async function ask(which) {
  const qEl = document.getElementById(`q${which}`);
  const oEl = document.getElementById(`o${which}`);
  const btn = document.getElementById(`ask${which}`);
  const meta = document.getElementById(`meta${which}`);
  const q = qEl.value.trim();
  if (!q && !imgData[which]) return;

  oEl.textContent = '';
  btn.disabled = true;
  meta.textContent = 'streaming…';

  const t0 = performance.now();
  let firstTokAt = null, tokenCount = 0;

  // Build content: text + optional image_url (OpenAI-compatible).
  let content;
  if (imgData[which]) {
    content = [];
    if (q) content.push({type: 'text', text: q});
    content.push({type: 'image_url', image_url: {url: imgData[which]}});
  } else {
    content = q;
  }

  try {
    const res = await fetch('/v1/chat/completions', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'gemma-4-a4b-q4km',
        messages: [{ role: 'user', content }],
        max_tokens: 256,
        stream: true,
      }),
    });
    if (!res.ok) {
      oEl.textContent = `(http ${res.status}) ${await res.text()}`;
      return;
    }
    // Pick up the sid from the response header and start polling the KV
    // snapshot endpoint so the tenancy strip updates live for this pane.
    const sidHeader = res.headers.get('X-Gemma-Session-Id');
    paneSid[which] = sidHeader ? parseInt(sidHeader, 10) : null;
    if (paneSid[which] !== null) kvPoll();
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += decoder.decode(value, {stream: true});
      // SSE frames split by blank lines.
      let idx;
      while ((idx = buf.indexOf('\n\n')) !== -1) {
        const frame = buf.slice(0, idx);
        buf = buf.slice(idx + 2);
        for (const line of frame.split('\n')) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6);
          if (data === '[DONE]') continue;
          try {
            const j = JSON.parse(data);
            const delta = j.choices?.[0]?.delta?.content;
            if (delta) {
              if (firstTokAt === null) firstTokAt = performance.now();
              tokenCount++;
              oEl.textContent += delta;
              oEl.scrollTop = oEl.scrollHeight;
            }
          } catch (e) { /* ignore partial json */ }
        }
      }
    }
    const wall = (performance.now() - t0) / 1000;
    const ttft = firstTokAt ? ((firstTokAt - t0) / 1000).toFixed(2) : '?';
    meta.textContent = `ttft=${ttft}s · ${tokenCount} chunks in ${wall.toFixed(2)}s`;
  } finally {
    btn.disabled = false;
    // Note: intentionally NOT clearing paneSid[which] here. kvPoll keeps
    // rendering against the server's lingering session; when the server
    // finally closes it (after LINGER_SECONDS), the session disappears
    // from the snapshot and kvPoll exits with the last render intact.
  }
}
</script>
</body>
</html>
